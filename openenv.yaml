spec_version: 1
name: email_env
type: space
runtime: fastapi
app: server.app:app
port: 8000

entry_point: server.email_env_environment:EmailEnvironment

tasks:
  - id: easy_spam_detection
    description: Detect spam email
    grader: default

  - id: medium_classification
    description: Detect urgent email
    grader: default

  - id: hard_classification
    description: Detect normal email
    grader: default