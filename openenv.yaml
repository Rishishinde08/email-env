spec_version: 1
name: email_env
type: space
runtime: fastapi
app: server.app:app
port: 8000

description: Email Classification Environment

entry_point: server.email_env_environment:EmailEnvironment

tasks:
  - name: easy_spam_detection
    description: Detect spam email
    input: "Win a FREE iPhone now!!!"
    expected_output: "spam"

  - name: medium_classification
    description: Detect urgent email
    input: "Meeting at 5 PM today"
    expected_output: "urgent"

  - name: hard_classification
    description: Detect normal email
    input: "Lunch tomorrow?"
    expected_output: "normal"